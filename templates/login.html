<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Pão na Porta</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="topo-mobile">
  <div class="logo-area">
    <a href="{{ url_for('home') }}">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Pão na Porta" class="logo-img">
    </a>
  </div>

  <button class="menu-btn" onclick="abrirMenu()">☰</button>
</header>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<aside class="menu-lateral" id="menuLateral">
  <div class="menu-topo">
    <a href="{{ url_for('home') }}">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Pão na Porta" class="menu-logo-img">
    </a>
    <button class="fechar-btn" onclick="fecharMenu()">✕</button>
  </div>

  <nav class="menu-links">
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('cardapio') }}">Cardápio</a>
    <a href="{{ url_for('login') }}">Entrar</a>
    <a href="{{ url_for('cadastro') }}">Cadastrar</a>
  </nav>
</aside>

<section class="login-page">
  <div class="login-overlay"></div>

  <div class="login-card">
    <div class="login-icon">🥖</div>

    <h2>Entrar</h2>
    <p class="subtitle">Acesse sua conta para fazer seus pedidos</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for categoria, mensagem in messages %}
          <div class="flash-message {{ categoria }}">
            {{ mensagem }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" class="login-form">
      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
      </div>

      <button type="submit" class="btn-login">Entrar</button>
    </form>

    <p class="register">
      Não tem conta?
      <a href="{{ url_for('cadastro') }}">Criar conta</a>
    </p>
  </div>
</section>

<script>
  function abrirMenu() {
    document.getElementById("menuLateral").classList.add("ativo");
    document.getElementById("overlay").classList.add("ativo");
  }

  function fecharMenu() {
    document.getElementById("menuLateral").classList.remove("ativo");
    document.getElementById("overlay").classList.remove("ativo");
  }
</script>

</body>
</html>
