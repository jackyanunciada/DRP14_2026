{% extends "base.html" %}
{% block content %}

<section class="card">
  <h1>
    {% if modo == "criar" %}Novo pedido{% else %}Editar pedido #{{ pedido["id"] }}{% endif %}
  </h1>

  <form class="form" method="post"
        action="{% if modo == 'criar' %}{{ url_for('criar') }}{% else %}{{ url_for('atualizar', pedido_id=pedido['id']) }}{% endif %}">

    <label>Nome do cliente</label>
    <input name="cliente" value="{{ pedido['cliente'] }}" placeholder="Ex.: Maria da Silva" required />

    <label>Detalhes do pedido</label>
    <textarea name="descricao" rows="5" placeholder="Ex.: 20 pães franceses e 10 pães integrais" required>{{ pedido['descricao'] }}</textarea>

    <div class="grid">
      <div>
        <label>Quantidade / variedade</label>
        <input name="quantidade_variedade" value="{{ pedido['quantidade_variedade'] }}" placeholder="Ex.: 20 franceses + 10 integrais" required />
      </div>

      <div>
        <label>Status</label>
        <select name="status">
          {% for opt in ["Pendente","Confirmado","Em separação","Aguardando entrega","Saiu para entrega","Entregue","Cancelado"] %}
            <option value="{{ opt }}" {% if pedido["status"]==opt %}selected{% endif %}>{{ opt }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="grid">
      <div>
        <label>Tipo de entrega</label>
        <select name="tipo_entrega">
          {% for opt in ["Retirada","Motoboy","Uber"] %}
            <option value="{{ opt }}" {% if pedido["tipo_entrega"]==opt %}selected{% endif %}>{{ opt }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label>Taxa de entrega (R$)</label>
        <input name="taxa_entrega" type="number" step="0.01" value="{{ pedido['taxa_entrega'] }}" placeholder="Ex.: 12.00" required />
      </div>
    </div>

    <div class="grid">
      <div>
        <label>Prioridade de entrega</label>
        <select name="prioridade">
          {% for opt in ["Baixa","Média","Alta"] %}
            <option value="{{ opt }}" {% if pedido["prioridade"]==opt %}selected{% endif %}>{{ opt }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label>Valor total (R$)</label>
        <input name="valor_total" type="number" step="0.01" value="{{ pedido['valor_total'] }}" placeholder="Ex.: 45.00" required />
      </div>
    </div>

    <div class="row end">
      <a class="btn ghost" href="{{ url_for('index') }}">Cancelar</a>
      <button class="btn" type="submit">
        {% if modo == "criar" %}Criar pedido{% else %}Salvar alterações{% endif %}
      </button>
    </div>
  </form>
</section>

{% endblock %}
